<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 44" fill="none">
  <style>
    .s { stroke: #5BA8E0; }
    .a { stroke: #8AB4D6; }
    @media (prefers-color-scheme: light) {
      .s { stroke: #E8600A; }
      .a { stroke: #D45500; }
    }
  </style>
  <!-- Glow bloom -->
  <path d="M 7 39 L 7 9 L 22 27 L 37 9 L 37 39"
        class="s" stroke-width="10" stroke-linecap="square" stroke-linejoin="miter" opacity="0.12"/>
  <!-- Thick verticals -->
  <line x1="7"  y1="40" x2="7"  y2="8.5" class="s" stroke-width="6.5" stroke-linecap="square"/>
  <line x1="37" y1="40" x2="37" y2="8.5" class="s" stroke-width="6.5" stroke-linecap="square"/>
  <!-- Thin diagonals -->
  <line x1="7.5" y1="9.5" x2="22" y2="27" class="s" stroke-width="3"   stroke-linecap="round"/>
  <line x1="22"  y1="27"  x2="36.5" y2="9.5" class="s" stroke-width="3" stroke-linecap="round"/>
  <!-- Glass edge highlight -->
  <line x1="5"  y1="40" x2="5"  y2="8.5" stroke="rgba(255,255,255,0.3)" stroke-width="0.9" stroke-linecap="square"/>
  <line x1="35" y1="40" x2="35" y2="8.5" stroke="rgba(255,255,255,0.15)" stroke-width="0.9" stroke-linecap="square"/>
  <!-- Tsuba crosspieces at peaks -->
  <line x1="3.5"  y1="8.5" x2="10.5" y2="8.5" class="a" stroke-width="2" stroke-linecap="square"/>
  <line x1="33.5" y1="8.5" x2="40.5" y2="8.5" class="a" stroke-width="2" stroke-linecap="square"/>
</svg>
